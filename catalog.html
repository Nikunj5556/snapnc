<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | Snapsnicker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fbfbfd; /* Apple-style off-white */
            color: #1d1d1f;            /* Apple-style deep text */
            -webkit-font-smoothing: antialiased;
        }
        
        /* Cinematic styling classes */
        .cinematic-shadow {
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }
        
        .hover-scale {
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .hover-scale:hover {
            transform: scale(1.02) translateY(-4px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="w-full bg-white/70 backdrop-blur-lg fixed top-0 z-50 border-b border-gray-200/50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-tight text-[#1d1d1f]">Snapsnicker.</a>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-24 px-6">
        <div class="max-w-7xl mx-auto">
            
            <header class="text-center mb-16">
                <h1 class="text-5xl md:text-6xl font-bold tracking-tight mb-5 text-[#1d1d1f]">
                    Discover the Collections.
                </h1>
                <p class="text-lg md:text-xl text-gray-500 font-light max-w-2xl mx-auto">
                    Experience premium quality crafted for the modern aesthetic. Choose a catalog to explore our exclusive products.
                </p>
            </header>

            <div id="catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                <div class="bg-gray-200/60 animate-pulse rounded-[2rem] aspect-[4/5] w-full"></div>
                <div class="bg-gray-200/60 animate-pulse rounded-[2rem] aspect-[4/5] w-full"></div>
                <div class="bg-gray-200/60 animate-pulse rounded-[2rem] aspect-[4/5] w-full"></div>
            </div>
            
        </div>
    </main>

    <footer class="bg-[#fbfbfd] border-t border-gray-200/60 py-10 mt-auto">
        <div class="max-w-7xl mx-auto px-6 text-center text-sm text-gray-400 font-light">
            &copy; 2026 Snapsnicker. Premium Ecommerce Experience.
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('catalog-grid');

            // Fetch catalogs from your Vercel Serverless Function
            fetch('/api/catalogs')
                .then(response => {
                    if (!response.ok) throw new Error('Network Error');
                    return response.json();
                })
                .then(data => {
                    grid.innerHTML = ''; // Clear loading skeletons
                    
                    if (!data || data.length === 0) {
                        grid.innerHTML = '<p class="col-span-full text-center text-gray-400 text-lg">No catalogs available right now. Check back soon.</p>';
                        return;
                    }

                    // Build and inject catalog cards
                    data.forEach(catalog => {
                        // Fallback image for premium feel just in case your DB is missing one
                        const fallbackImg = 'https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?q=80&w=800&auto=format&fit=crop';
                        const imageUrl = catalog.catalog_image_url || fallbackImg;
                        
                        const card = document.createElement('a');
                        card.href = `/catalog/${catalog.id}`;
                        card.className = 'group block relative overflow-hidden rounded-[2rem] bg-white cinematic-shadow hover-scale cursor-pointer aspect-[4/5] isolate';
                        
                        card.innerHTML = `
                            <div class="absolute inset-0 bg-gray-100 -z-10">
                                <img src="${imageUrl}" alt="${catalog.catalog_name}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" loading="lazy" />
                            </div>
                            
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent -z-10"></div>
                            
                            <div class="absolute bottom-0 left-0 w-full p-8 flex flex-col justify-end h-full">
                                <h2 class="text-3xl font-semibold text-white tracking-tight mb-2 drop-shadow-md">
                                    ${catalog.catalog_name}
                                </h2>
                                <span class="inline-flex items-center text-sm font-medium text-white/70 group-hover:text-white transition-colors">
                                    Explore Collection 
                                    <svg class="ml-2 w-4 h-4 transition-transform duration-300 group-hover:translate-x-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                    </svg>
                                </span>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                })
                .catch(error => {
                    console.error('Error fetching catalogs:', error);
                    grid.innerHTML = '<p class="col-span-full text-center text-red-400 text-lg">Unable to load the collections at this time.</p>';
                });
        });
    </script>
</body>
</html>
